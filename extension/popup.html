<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 380px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #f8f9fa;
    }
    .container {
      text-align: center;
    }
    h2 {
      font-size: 16px;
      color: #1a1a2e;
      margin: 0 0 4px 0;
    }
    .desc {
      font-size: 12px;
      color: #666;
      margin: 0 0 12px 0;
      line-height: 1.5;
    }
    .config-summary {
      font-size: 12px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 12px;
      text-align: left;
    }
    .config-summary div {
      margin: 2px 0;
    }
    .config-summary .label {
      color: #888;
    }
    .config-summary .value {
      color: #1a73e8;
      font-weight: 500;
    }
    .status {
      font-size: 13px;
      color: #333;
      margin: 12px 0;
      padding: 10px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #e0e0e0;
      min-height: 20px;
      word-break: break-all;
    }
    .status.success {
      border-color: #4caf50;
      background: #e8f5e9;
    }
    .status.error {
      border-color: #f44336;
      background: #ffebee;
    }
    .status.info {
      border-color: #2196f3;
      background: #e3f2fd;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }
    button {
      padding: 10px 20px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }
    .btn-primary:hover {
      background: #1557b0;
    }
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #bdbdbd;
    }
    button:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }
    .settings-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px;
      color: #1a73e8;
      text-decoration: none;
      cursor: pointer;
    }
    .settings-link:hover {
      text-decoration: underline;
    }
    .warning-box {
      background: #fff3e0;
      border: 1px solid #ff9800;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      text-align: left;
    }
    .warning-box .warning-title {
      font-weight: 500;
      color: #e65100;
      margin-bottom: 4px;
    }
    .warning-box .warning-desc {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
    .warning-box button {
      width: 100%;
      padding: 8px;
      font-size: 13px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Cookie Saver</h2>
    <p class="desc">将指定 Cookie 保存到本地，供 AI 自动化使用</p>

    <div id="hostWarning" class="warning-box hidden">
      <div class="warning-title">⚠️ Native Host 未安装</div>
      <div class="warning-desc">无法保存到本地文件，但可以读取 Cookie 并复制到剪贴板</div>
      <button id="installBtn" class="btn-primary">安装 Native Host</button>
    </div>

    <div class="config-summary" id="configSummary">
      <div>正在加载配置...</div>
    </div>

    <div id="status" class="status info">点击按钮读取 Cookie</div>

    <div class="btn-row">
      <button id="saveBtn" class="btn-primary">保存 Cookie</button>
      <button id="copyBtn" class="btn-secondary">复制 Cookie</button>
      <button id="settingsBtn" class="btn-secondary">设置</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
